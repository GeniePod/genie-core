# Mosquitto MQTT broker configuration for GeniePod
# Installed to /etc/geniepod/mosquitto.conf
#
# Local-only broker: HA ↔ genie-core ↔ Matter/Thread devices.
# No external access. No authentication needed on loopback.

listener 1883 127.0.0.1
protocol mqtt

# Persistence for retained messages (HA state survives restarts).
persistence true
persistence_location /opt/geniepod/data/mqtt/

# Logging — minimal.
log_dest syslog
log_type error
log_type warning

# Memory limit — Mosquitto is lightweight (~5 MB).
max_queued_messages 1000
max_inflight_messages 20

# No anonymous access from external interfaces.
# Bind to localhost only — no auth needed.
allow_anonymous true
