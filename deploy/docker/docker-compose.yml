# GeniePod Docker Compose — only services that require Docker.
# Everything else runs as native systemd services for minimal overhead.
#
# Core (always-on):     Home Assistant
# Opt-in (first-boot):  Nextcloud, Jellyfin, SearXNG

services:
  # ============================================================
  # CORE: Home Assistant
  # ============================================================
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - ha-config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=${TZ:-America/Denver}
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8123/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ============================================================
  # OPT-IN: Nextcloud (files, calendar, contacts)
  # ============================================================
  nextcloud:
    container_name: nextcloud
    image: nextcloud:fpm-alpine
    restart: unless-stopped
    profiles: ["sovereign"]
    ports:
      - "8180:80"
    volumes:
      - nc-data:/var/www/html
    environment:
      - SQLITE_DATABASE=nextcloud
      - NEXTCLOUD_ADMIN_USER=${NC_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NC_ADMIN_PASSWORD:-changeme}
      - NEXTCLOUD_TRUSTED_DOMAINS=geniepod.local
      - PHP_MEMORY_LIMIT=256M
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:80/status.php"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s

  # ============================================================
  # OPT-IN: Jellyfin (media server, direct play only)
  # ============================================================
  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin:latest
    restart: unless-stopped
    profiles: ["sovereign"]
    ports:
      - "8096:8096"
    volumes:
      - jf-config:/config
      - jf-cache:/cache
      - ${MEDIA_DIR:-/mnt/media}:/media:ro
    environment:
      - JELLYFIN_PublishedServerUrl=http://geniepod.local:8096
    deploy:
      resources:
        limits:
          memory: 512M
    # No GPU passthrough — direct play only, no transcoding on Jetson.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8096/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ============================================================
  # OPT-IN: SearXNG (privacy-focused web search)
  # ============================================================
  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    restart: unless-stopped
    profiles: ["sovereign"]
    ports:
      - "8888:8080"
    volumes:
      - searxng-config:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://geniepod.local:8888/
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  ha-config:
    driver: local
  nc-data:
    driver: local
  jf-config:
    driver: local
  jf-cache:
    driver: local
  searxng-config:
    driver: local
